services:

  extension:
    build:
      context: .
      dockerfile: apps/extension/Dockerfile
    container_name: prs_extension
    env_file:
      - .env
    volumes:
      - ./apps/extension:/app/apps/extension
      - /app/node_modules
    command: npm run dev --workspace=extension-app

  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build: ./apps/backend
    container_name: prs_backend
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_PORT=${DB_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./apps/backend:/app

  worker:
    build: ./apps/worker

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: prs_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: prs_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"

volumes:
  postgres_data: